<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Temu-GPT</title>
  <link rel="icon" type="image/png" href="frontend/assets/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="frontend/style.css">
  <style>
    .gal-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    .gal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .gal-back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
    }

    .gal-back-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .gal-header h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }

    .gal-count {
      font-size: 0.7rem;
      background: rgba(108, 99, 255, .15);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 10px;
      font-family: 'DM Mono', monospace;
    }

    /* ── Grid ── */
    .gal-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .gal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .gal-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      aspect-ratio: 1;
    }

    .gal-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .gal-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gal-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
      opacity: 0;
      transition: opacity 0.15s;
    }

    .gal-card:hover .gal-card-info {
      opacity: 1;
    }

    .gal-card-name {
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gal-card-meta {
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    /* ── Folder cards ── */
    .gal-folder {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .gal-folder:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .gal-folder-icon {
      font-size: 2.5rem;
    }

    .gal-folder-name {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      padding: 0 8px;
      word-break: break-all;
    }

    .gal-folder-count {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── Breadcrumb ── */
    .gal-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px 0;
      font-size: 0.8rem;
      flex-wrap: wrap;
    }

    .gal-crumb {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }

    .gal-crumb:hover {
      text-decoration: underline;
    }

    .gal-crumb-sep {
      color: var(--muted);
    }

    .gal-crumb-current {
      color: var(--text);
      font-weight: 600;
    }

    .gal-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 60px 20px;
      text-align: center;
    }

    .gal-empty-icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    /* ── Lightbox ── */
    .gal-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .gal-lightbox.open {
      display: flex;
    }

    .gal-lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .gal-lightbox-close:hover {
      opacity: 1;
    }

    .gal-lightbox img {
      max-width: 90vw;
      max-height: 75vh;
      border-radius: 12px;
      object-fit: contain;
    }

    .gal-lightbox-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .gal-lb-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .gal-lb-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .gal-lb-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .gal-lb-btn.primary:hover {
      opacity: 0.85;
      color: #fff;
    }

    .gal-lightbox-name {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .gal-lb-status {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
      min-height: 20px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .gal-header {
        padding: 0 12px;
        height: 48px;
        gap: 8px;
      }

      .gal-header h1 {
        font-size: 0.85rem;
      }

      .gal-content {
        padding: 12px;
      }

      .gal-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }

      .gal-card-info {
        opacity: 1;
      }

      .gal-lightbox img {
        max-width: 95vw;
        max-height: 65vh;
      }

      .gal-lightbox-actions {
        gap: 6px;
      }

      .gal-lb-btn {
        padding: 7px 14px;
        font-size: 0.72rem;
      }
    }

    @media (max-width: 480px) {
      .gal-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 6px;
      }

      .gal-card {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
<div class="gal-page">

  <div class="gal-header">
    <a href="/" class="gal-back-btn">← Back</a>
    <h1>🖼️ Gallery</h1>
    <span class="gal-count" id="gal-count">...</span>
    <nav style="margin-left:auto;display:flex;gap:6px;align-items:center;">
      <a href="/gallery" class="gal-back-btn"
         style="border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.1)">🖼️ Gallery</a>
      <a href="/sort" class="gal-back-btn">🗂️ Sortieren</a>
      <a href="/workflows" class="gal-back-btn">⚙️ Workflows</a>
    </nav>
  </div>

  <div class="gal-breadcrumb" id="gal-breadcrumb"></div>

  <div class="gal-content" id="gal-content">
    <div class="gal-empty">
      <div class="gal-empty-icon">↻</div>
      <p>Loading...</p>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="gal-lightbox" id="gal-lightbox">
    <button class="gal-lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lb-img" src="" alt="">
    <div class="gal-lightbox-actions">
      <a class="gal-lb-btn" id="lb-download" href="" download>⬇️ Download</a>
      <button class="gal-lb-btn primary" id="lb-workflow" onclick="extractAndOpenWorkflow()">⚙️ Open in Workflow
        Editor
      </button>
    </div>
    <div class="gal-lb-status" id="lb-status"></div>
    <div class="gal-lightbox-name" id="lb-name"></div>
  </div>

</div>

<script>
  let currentImage = null;
  let currentFolder = '';   // aktuelle Verzeichnisebene

  async function loadGallery(folder) {
    folder = folder || '';
    currentFolder = folder;

    const content = document.getElementById('gal-content');
    const count = document.getElementById('gal-count');

    content.innerHTML = '<div class="gal-empty"><div class="gal-empty-icon">↻</div><p>Loading...</p></div>';
    renderBreadcrumb(folder);

    try {
      const url = folder ? `/api/gallery?folder=${encodeURIComponent(folder)}` : '/api/gallery';
      const resp = await fetch(url);
      const data = await resp.json();

      const total = data.folders.length + data.images.length;
      count.textContent = `${data.folders.length ? data.folders.length + ' 📁  ' : ''}${data.total} 🖼️`;

      if (!total) {
        content.innerHTML = `<div class="gal-empty"><div class="gal-empty-icon">🖼️</div><p>Leer.</p></div>`;
        return;
      }

      content.innerHTML = `<div class="gal-grid" id="gal-grid"></div>`;
      const grid = document.getElementById('gal-grid');

      // Ordner zuerst
      for (const f of data.folders) {
        const card = document.createElement('div');
        card.className = 'gal-folder';
        card.onclick = () => loadGallery(f.path);
        card.innerHTML = `
                    <div class="gal-folder-icon">📁</div>
                    <div class="gal-folder-name">${f.name}</div>
                    <div class="gal-folder-count">${f.count} Bilder</div>`;
        grid.appendChild(card);
      }

      // Dann Bilder
      for (const img of data.images) {
        const card = document.createElement('div');
        card.className = 'gal-card';
        card.onclick = () => openLightbox(img);
        card.innerHTML = `
                    <img src="${img.url}" alt="${img.filename}" loading="lazy">
                    <div class="gal-card-info">
                        <div class="gal-card-name">${img.filename}</div>
                        <div class="gal-card-meta">${img.size_kb} KB · ${img.modified}</div>
                    </div>`;
        grid.appendChild(card);
      }
    } catch (e) {
      content.innerHTML = `<div class="gal-empty"><div class="gal-empty-icon">❌</div><p>${e.message}</p></div>`;
    }
  }

  function renderBreadcrumb(folder) {
    const bc = document.getElementById('gal-breadcrumb');
    if (!folder) {
      bc.innerHTML = '';
      return;
    }

    const parts = folder.split('/').filter(Boolean);
    let html = `<span class="gal-crumb" onclick="loadGallery('')">🏠 exportImg</span>`;
    let cumPath = '';
    parts.forEach((part, i) => {
      cumPath = cumPath ? `${cumPath}/${part}` : part;
      html += `<span class="gal-crumb-sep">›</span>`;
      if (i === parts.length - 1) {
        html += `<span class="gal-crumb-current">${part}</span>`;
      } else {
        const p = cumPath;
        html += `<span class="gal-crumb" onclick="loadGallery('${p}')">${part}</span>`;
      }
    });
    bc.innerHTML = html;
  }

  function openLightbox(img) {
    currentImage = img;
    document.getElementById('lb-img').src = img.url;
    document.getElementById('lb-download').href = img.url;
    document.getElementById('lb-download').download = img.filename;
    document.getElementById('lb-name').textContent = img.path || img.filename;
    document.getElementById('lb-status').textContent = '';
    document.getElementById('gal-lightbox').classList.add('open');
    const btn = document.getElementById('lb-workflow');
    btn.disabled = false;
    btn.textContent = '⚙️ Open in Workflow Editor';
  }

  function closeLightbox() {
    document.getElementById('gal-lightbox').classList.remove('open');
    currentImage = null;
  }

  // Close on Escape or clicking outside
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
  document.getElementById('gal-lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  async function extractAndOpenWorkflow() {
    if (!currentImage) return;
    const status = document.getElementById('lb-status');
    const btn = document.getElementById('lb-workflow');

    // Only PNGs have embedded workflows
    if (!currentImage.filename.toLowerCase().endsWith('.png')) {
      status.textContent = '⚠️ Only PNG files can contain workflows';
      return;
    }

    btn.disabled = true;
    status.textContent = '⏳ Extracting workflow...';

    try {
      // Fetch the image as blob
      const imgResp = await fetch(currentImage.url);
      const blob = await imgResp.blob();

      // Send to extraction endpoint
      const fd = new FormData();
      fd.append('file', blob, currentImage.filename);
      const resp = await fetch('/api/workflows/extract-from-image', {method: 'POST', body: fd});
      const data = await resp.json();

      if (data.error) {
        status.textContent = `❌ ${data.error}`;
        btn.disabled = false;
        return;
      }

      // Store workflow + image URL in sessionStorage and redirect
      sessionStorage.setItem('pending_workflow', JSON.stringify({
        workflow: data.workflow,
        name: currentImage.filename.replace('.png', ''),
        source: data.source,
        imageUrl: currentImage.url
      }));

      window.location.href = '/workflows';

    } catch (e) {
      status.textContent = `❌ Error: ${e.message}`;
      btn.disabled = false;
    }
  }

  // Init
  loadGallery('');
</script>
</body>
</html>
