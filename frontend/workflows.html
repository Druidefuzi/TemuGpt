<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/style.css">
    <link rel="stylesheet" href="frontend/workflow_style.css">
</head>
<body>
<div class="wf-page">

    <!-- Header -->
    <div class="app-header">
    <a href="/" class="app-brand">
        <img src="frontend/assets/logo.png" class="app-logo" id="app-logo" alt="Logo">
        <span class="app-name" id="app-name">AI Assistant</span>
    </a>
        <nav class="app-nav">





        </nav>
    <nav class="app-nav">

    </nav>
</div>

    <div class="wf-sidebar-overlay" id="wf-sidebar-overlay" onclick="toggleWfSidebar()"></div>

    <div class="wf-layout">

        <!-- Workflow List Sidebar -->
        <div class="wf-sidebar">
            <div class="wf-sidebar-header">
                <span>📁 Workflows</span>
                <div style="display:flex;gap:4px;align-items:center;">
                    <button class="wf-refresh-btn" onclick="document.getElementById('wf-img-upload').click()" title="Workflow aus Bild laden">🖼️</button>
                    <button class="wf-refresh-btn" onclick="loadWorkflowList()" title="Aktualisieren">↻</button>
                </div>
                <input type="file" id="wf-img-upload" accept=".png" style="display:none" onchange="loadWorkflowFromImage(this)">
            </div>
            <div id="workflow-list">
                <div class="wf-loading">↻ Lade...</div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="wf-main">

            <!-- Placeholder -->
            <div id="wf-placeholder">
                <div class="ph-icon">🗂️</div>
                <p>Workflow aus der Liste auswählen</p>
            </div>

            <!-- Editor (hidden until workflow selected) -->
            <div id="wf-editor">

                <!-- Params Panel -->
                <div class="wf-params-panel" style="position:relative">
                    <div class="wf-params-header">
                        <h2>Parameter — <span id="wf-name-title">...</span></h2>
                        <button id="pa-trigger-btn" onclick="togglePromptAssist()"
                            style="display:none;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:7px;padding:4px 10px;color:var(--muted);font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all .15s"
                            onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
                            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
                            ✨ Prompt-Assistent
                        </button>
                    </div>

                    <!-- Prompt Assistant Overlay -->
                    <div id="pa-overlay" style="display:none;position:absolute;bottom:60px;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--accent);border-bottom:1px solid var(--border);padding:12px 14px;display:none;flex-direction:column;gap:8px;box-shadow:0 -4px 20px rgba(0,0,0,.3)">
                        <div style="display:flex;align-items:center;justify-content:space-between">
                            <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)">✨ Prompt-Assistent</div>
                            <button onclick="togglePromptAssist()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px">×</button>
                        </div>
                        <div class="wf-style-row">
                            <button class="wf-style-btn" data-style="danbooru" onclick="setWfPromptStyle('danbooru')">Tags</button>
                            <button class="wf-style-btn" data-style="mixed"    onclick="setWfPromptStyle('mixed')">Mixed</button>
                            <button class="wf-style-btn" data-style="natural"  onclick="setWfPromptStyle('natural')">Natural</button>
                            <select id="wf-style-select" class="wf-style-dropdown" onchange="setWfImageStyle(this.value)"><option value="">Style</option></select>
                            <select id="wf-theme-select" class="wf-style-dropdown" onchange="setWfImageTheme(this.value)"><option value="">Theme</option></select>
                            <select id="wf-character-select" class="wf-style-dropdown" onchange="setWfImageCharacter(this.value)"><option value="">Char</option></select>
                        </div>
                        <div class="wf-input-mode-row">
                            <button class="wf-input-mode-btn active" id="pa-text-btn" onclick="setPromptInputMode('text')">Text</button>
                            <button class="wf-input-mode-btn" id="pa-img-btn" onclick="setPromptInputMode('image')">Image</button>
                        </div>
                        <div id="pa-text-wrap" class="wf-prompt-assist-input-row">
                            <textarea id="prompt-assist-input" class="wf-prompt-assist-textarea"
                                      placeholder="Beschreib dein Bild..." rows="2"
                                      onkeydown="handlePromptAssistKey(event)"></textarea>
                            <button class="wf-prompt-assist-btn" id="prompt-assist-btn" onclick="suggestPrompt()">✨</button>
                        </div>
                        <div id="pa-img-wrap" style="display:none">
                            <div class="wf-pa-img-drop" id="pa-img-drop"
                                 ondragover="event.preventDefault();this.classList.add('drag-over')"
                                 ondragleave="this.classList.remove('drag-over')"
                                 ondrop="handlePaImgDrop(event)"
                                 onclick="document.getElementById('pa-img-file').click()">
                                <div id="pa-img-preview-wrap">
                                    <div class="wf-pa-img-hint"><span>🖼️</span><span>Bild ziehen oder klicken</span></div>
                                </div>
                                <input type="file" id="pa-img-file" accept="image/*" style="display:none" onchange="loadPaImageFile(this.files[0])">
                            </div>
                            <button class="wf-prompt-assist-btn" onclick="suggestPrompt()" style="width:100%;margin-top:6px;border-radius:8px">✨ Aus Bild generieren</button>
                        </div>
                        <div id="prompt-assist-result" class="wf-prompt-assist-result" style="display:none">
                            <div class="wf-prompt-assist-result-label">Vorschlag:</div>
                            <div id="prompt-assist-text" class="wf-prompt-assist-text"></div>
                            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
                                <button class="wf-prompt-assist-copy-btn" onclick="copyPromptToEditor()">↗ Übernehmen</button>
                                <label style="display:flex;align-items:center;gap:5px;font-size:0.72rem;color:var(--muted);cursor:pointer;margin-left:auto">
                                    <input type="checkbox" id="pa-critic-enabled" style="accent-color:var(--accent)"> Auto-Critic
                                </label>
                                <button class="wf-prompt-assist-copy-btn" id="pa-critic-btn" onclick="runPromptAssistCritic()"
                                        style="display:none;background:none;border-color:var(--border);color:var(--muted)">🔍 Analysieren</button>
                            </div>
                            <div id="pa-critic-result"></div>
                        </div>
                    </div>
                    <div id="wf-params"></div>
                    <div class="wf-run-bar">
                        <div class="wf-run-row">
                            <button id="run-btn" onclick="runWorkflowWithUnload()">▶ Generate</button>
                            <button class="wf-save-btn" onclick="saveWorkflowAs()" title="Save as new workflow">💾 Save</button>
                        </div>
                    </div>
                </div>

                <!-- Output Panel -->
                <div class="wf-output-panel">
                    <div class="wf-output-header">🖼️ Output</div>

                    <div id="wf-output">
                        <div class="wf-output-empty">No image. Generste one!</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="frontend/workflow_wildcards.js"></script>
<script src="frontend/workflow_ui.js"></script>
<script src="frontend/navigation.js"></script>
</body>
</html>
