<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Editor — Office Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="frontend/style.css">
    <style>
        /* ── Workflow Editor Page ─────────────────────────────────────────── */
        * { box-sizing: border-box; }

        .wf-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
        }

        .wf-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            height: 52px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .wf-back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 5px 12px;
            font-family: 'Syne', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all .15s;
        }
        .wf-back-btn:hover { border-color: var(--accent); color: var(--text); }

        .wf-header h1 { font-size: 1rem; font-weight: 700; margin: 0; }
        .wf-header-badge {
            font-size: 0.7rem;
            background: rgba(108,99,255,.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 20px;
            padding: 2px 10px;
        }

        /* ── Layout ──────────────────────────────────────────────────────── */
        .wf-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── Sidebar: Workflow List ──────────────────────────────────────── */
        .wf-sidebar {
            width: 240px;
            border-right: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .wf-sidebar-header {
            padding: 12px 14px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wf-refresh-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color .15s;
        }
        .wf-refresh-btn:hover { color: var(--text); }

        #workflow-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .wf-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
            border: 1px solid transparent;
        }
        .wf-item:hover  { background: var(--surface2); }
        .wf-item.active { background: rgba(108,99,255,.1); border-color: var(--accent); }

        .wf-item-icon { font-size: 1.2rem; flex-shrink: 0; }
        .wf-item-name { font-size: 0.82rem; font-weight: 600; }
        .wf-item-nodes { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

        .wf-loading, .wf-empty {
            padding: 20px 12px;
            color: var(--muted);
            font-size: 0.78rem;
            text-align: center;
        }

        /* ── Main: Editor + Output ──────────────────────────────────────── */
        .wf-main {
            flex: 1;
            display: flex;
            min-width: 0;
            overflow: hidden;
        }

        /* Placeholder */
        #wf-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
        }
        #wf-placeholder .ph-icon { font-size: 3rem; opacity: .4; }
        #wf-placeholder p { font-size: 0.85rem; }

        /* Editor */
        #wf-editor {
            flex: 1;
            display: none;
            flex-direction: row;
            min-width: 0;
        }

        /* Params panel */
        .wf-params-panel {
            width: 380px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .wf-params-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .wf-params-header h2 { font-size: 0.88rem; font-weight: 700; margin: 0; }
        #wf-name-title { color: var(--accent); }

        #wf-params {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wf-run-bar {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #run-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
        }
        #run-btn:hover    { opacity: .85; }
        #run-btn:active   { transform: scale(.98); }
        #run-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* Output panel */
        .wf-output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .wf-output-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--muted);
            flex-shrink: 0;
        }

        #wf-output {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .wf-output-empty {
            color: var(--muted);
            font-size: 0.82rem;
            text-align: center;
        }

        .wf-generating {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .wf-spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .wf-result { display: flex; flex-direction: column; align-items: center; gap: 12px; max-width: 100%; }
        .wf-result img {
            max-width: 100%;
            max-height: calc(100vh - 200px);
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: zoom-in;
            transition: max-height .3s;
        }
        .wf-result img.fullsize { max-height: none; cursor: zoom-out; }
        .wf-result-actions { display: flex; gap: 8px; }
        .wf-dl-btn {
            padding: 7px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.78rem;
            font-family: 'Syne', sans-serif;
            transition: border-color .15s;
        }
        .wf-dl-btn:hover { border-color: var(--accent); }
        .wf-error { color: #f38ba8; font-size: 0.82rem; }

        /* ── Section / Field Styles ──────────────────────────────────────── */
        .wf-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wf-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .wf-textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            padding: 8px 10px;
            resize: vertical;
            outline: none;
            transition: border-color .15s;
            line-height: 1.5;
        }
        .wf-textarea:focus { border-color: var(--accent); }
        .wf-textarea-neg { opacity: .8; }

        .wf-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .wf-field-wide { grid-column: 1 / -1; }

        .wf-field { display: flex; flex-direction: column; gap: 5px; }
        .wf-field label {
            font-size: 0.68rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .wf-slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .wf-slider-row input[type=range] { flex: 1; }
        .wf-slider-row span {
            font-size: 0.72rem;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            min-width: 36px;
            text-align: right;
        }

        .wf-field select, .wf-text-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.78rem;
            padding: 6px 8px;
            outline: none;
            width: 100%;
            transition: border-color .15s;
        }
        .wf-field select:focus, .wf-text-input:focus { border-color: var(--accent); }

        .wf-seed-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .wf-seed-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            padding: 6px 8px;
            outline: none;
            transition: border-color .15s;
        }
        .wf-seed-input:focus { border-color: var(--accent); }
        .wf-seed-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            cursor: pointer;
            padding: 6px 10px;
            font-size: 0.85rem;
            transition: border-color .15s;
        }
        .wf-seed-btn:hover { border-color: var(--accent); }

        /* Aspect ratio */
        .wf-aspect-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .wf-aspect-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all .15s;
        }
        .wf-aspect-btn span { font-size: 0.6rem; color: var(--muted); font-weight: 400; }
        .wf-aspect-btn:hover  { border-color: var(--accent); }
        .wf-aspect-btn.active { background: rgba(108,99,255,.15); border-color: var(--accent); color: var(--accent); }
        .wf-aspect-btn.active span { color: var(--accent); opacity: .7; }

        .wf-custom-size {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .wf-custom-size input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            padding: 6px 8px;
            outline: none;
            transition: border-color .15s;
        }
        .wf-custom-size input:focus { border-color: var(--accent); }
        .wf-custom-size span { color: var(--muted); }

        /* LoRA */
        .wf-lora-row { display: flex; flex-direction: column; gap: 8px; }
        .wf-lora-strengths { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* Scrollbars */
        #wf-params::-webkit-scrollbar,
        #workflow-list::-webkit-scrollbar,
        #wf-output::-webkit-scrollbar { width: 3px; }
        #wf-params::-webkit-scrollbar-thumb,
        #workflow-list::-webkit-scrollbar-thumb,
        #wf-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        /* ── Prompt Assistent ────────────────────────────────────────────── */
        .wf-prompt-assist {
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .wf-prompt-assist-title {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .wf-prompt-assist-input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .wf-prompt-assist-textarea {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            padding: 8px 10px;
            resize: none;
            outline: none;
            transition: border-color .15s;
            line-height: 1.4;
        }
        .wf-prompt-assist-textarea:focus { border-color: var(--accent); }
        .wf-prompt-assist-btn {
            flex-shrink: 0;
            width: 38px; height: 38px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity .15s;
            display: flex; align-items: center; justify-content: center;
        }
        .wf-prompt-assist-btn:hover    { opacity: .85; }
        .wf-prompt-assist-btn:disabled { opacity: .4; cursor: not-allowed; }
        .wf-prompt-assist-btn.loading  { animation: pulse .8s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .wf-prompt-assist-result {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .wf-prompt-assist-result-label {
            font-size: 0.65rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        .wf-prompt-assist-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--text);
            line-height: 1.5;
            word-break: break-word;
        }
        .wf-prompt-assist-copy-btn {
            align-self: flex-end;
            background: none;
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 10px;
            cursor: pointer;
            transition: background .15s;
        }
        .wf-prompt-assist-copy-btn:hover { background: rgba(108,99,255,.1); }
    </style>
</head>
<body>
<div class="wf-page">

    <!-- Header -->
    <div class="wf-header">
        <button class="wf-back-btn" onclick="window.location.href='/'">← Zurück</button>
        <h1>⚙️ Workflow Editor</h1>
        <span class="wf-header-badge">Custom</span>
    </div>

    <div class="wf-layout">

        <!-- Workflow List Sidebar -->
        <div class="wf-sidebar">
            <div class="wf-sidebar-header">
                <span>📁 Workflows</span>
                <button class="wf-refresh-btn" onclick="loadWorkflowList()" title="Aktualisieren">↻</button>
            </div>
            <div id="workflow-list">
                <div class="wf-loading">↻ Lade...</div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="wf-main">

            <!-- Placeholder -->
            <div id="wf-placeholder">
                <div class="ph-icon">🗂️</div>
                <p>Workflow aus der Liste auswählen</p>
            </div>

            <!-- Editor (hidden until workflow selected) -->
            <div id="wf-editor">

                <!-- Params Panel -->
                <div class="wf-params-panel">
                    <div class="wf-params-header">
                        <h2>Parameter — <span id="wf-name-title">...</span></h2>
                    </div>
                    <div id="wf-params"></div>
                    <div class="wf-run-bar">
                        <button id="run-btn" onclick="runWorkflow()">▶ Generieren</button>
                    </div>
                </div>

                <!-- Output Panel -->
                <div class="wf-output-panel">
                    <div class="wf-output-header">🖼️ Output</div>

                    <!-- Prompt Assistent -->
                    <div class="wf-prompt-assist">
                        <div class="wf-prompt-assist-title">✨ Prompt-Assistent</div>
                        <div class="wf-prompt-assist-input-row">
                            <textarea id="prompt-assist-input" class="wf-prompt-assist-textarea"
                                      placeholder="Beschreib dein Bild... z.B. 'Mädchen mit roten Haaren im Wald'"
                                      rows="2" onkeydown="handlePromptAssistKey(event)"></textarea>
                            <button class="wf-prompt-assist-btn" id="prompt-assist-btn" onclick="suggestPrompt()">✨</button>
                        </div>
                        <div id="prompt-assist-result" class="wf-prompt-assist-result" style="display:none">
                            <div class="wf-prompt-assist-result-label">Prompt-Vorschlag:</div>
                            <div id="prompt-assist-text" class="wf-prompt-assist-text"></div>
                            <button class="wf-prompt-assist-copy-btn" onclick="copyPromptToEditor()">↗ In Editor übernehmen</button>
                        </div>
                    </div>

                    <div id="wf-output">
                        <div class="wf-output-empty">Noch kein Bild — drück auf Generieren!</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="frontend/workflow_ui.js"></script>
<script>
    loadWorkflowList();

    let lastSuggestedPrompt = '';

    async function suggestPrompt() {
        const input = document.getElementById('prompt-assist-input');
        const btn   = document.getElementById('prompt-assist-btn');
        const result = document.getElementById('prompt-assist-result');
        const text   = document.getElementById('prompt-assist-text');
        const msg = input.value.trim();
        if (!msg) return;

        btn.disabled = true;
        btn.classList.add('loading');
        result.style.display = 'none';

        try {
            const r = await fetch('/api/workflows/prompt-suggest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            const d = await r.json();
            lastSuggestedPrompt = d.prompt || '';
            text.textContent = lastSuggestedPrompt;
            result.style.display = 'flex';
        } catch(e) {
            text.textContent = '❌ Fehler: ' + e.message;
            result.style.display = 'flex';
        }

        btn.disabled = false;
        btn.classList.remove('loading');
    }

    function handlePromptAssistKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            suggestPrompt();
        }
    }

    function copyPromptToEditor() {
        if (!lastSuggestedPrompt) return;
        // Alle positiven Prompt-Textareas befüllen
        document.querySelectorAll('.wf-textarea:not(.wf-textarea-neg)').forEach(ta => {
            ta.value = lastSuggestedPrompt;
            ta.dispatchEvent(new Event('change'));
        });
        // Auch syncLinkedPrompts triggern
        const nodeId = workflowMeta.prompts.find(p => p.role === 'positive' && !p.hidden)?.id;
        if (nodeId) {
            patch(nodeId, 'text', lastSuggestedPrompt);
            syncLinkedPrompts(nodeId, lastSuggestedPrompt);
        }
    }
</script>
</body>
</html>
